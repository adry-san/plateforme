<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Plateforme</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a2e; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; }
    h1 { font-size: 1.8rem; color: #e2b96f; margin-bottom: 10px; text-align: center; }
    p.subtitle { color: #aaa; margin-bottom: 40px; text-align: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 500px; }
    .tile { background: #16213e; border: 1px solid #333; border-radius: 16px; padding: 30px 20px; text-align: center; cursor: pointer; transition: transform 0.2s, border-color 0.2s; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .tile:hover { transform: translateY(-4px); border-color: #e2b96f; }
    .tile .icon { font-size: 2.5rem; }
    .tile .name { font-size: 1rem; font-weight: bold; color: #e2b96f; }
    .tile .desc { font-size: 0.8rem; color: #aaa; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>🏠 Ma Plateforme</h1>
  <p class="subtitle">Choisis un jeu</p>
  <div class="grid">
    <a href="tampon.html" class="tile">
      <div class="icon">🎯</div>
      <div class="name">Tampon Circulaire</div>
      <div class="desc">Tire un joueur au sort en secret</div>
    </a>
    <a href="coco.html" class="tile">
      <div class="icon">🃏</div>
      <div class="name">Bonjour Manger Coco</div>
      <div class="desc">Jeu de cartes multijoueur</div>
    </a>
  </div>
</body>
</html>
